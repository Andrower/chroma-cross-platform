<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Chroma 启动页</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101812;
      --panel: #17221a;
      --panel-2: #223028;
      --button: #3f4943;
      --button-strong: #f4f4f0;
      --line: rgba(255, 255, 255, 0.16);
      --line-strong: rgba(255, 255, 255, 0.22);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.66);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    img {
      -webkit-user-drag: none;
      user-drag: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: auto;
      background: var(--bg);
      color: var(--text);
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      padding: 28px;
    }

    .page {
      display: grid;
      grid-template-columns: minmax(240px, 0.8fr) minmax(360px, 1.2fr);
      gap: 22px;
      width: min(1120px, 100%);
      min-height: calc(100vh - 56px);
      margin: 0 auto;
      align-items: stretch;
    }

    .qr {
      display: grid;
      place-items: center;
      padding: 20px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--panel);
      aspect-ratio: 1 / 1;
      align-self: center;
    }

    .qr img,
    .qr .missing {
      width: 100%;
      height: 100%;
      min-height: 260px;
      border-radius: 7px;
      object-fit: contain;
      background: #fff;
      padding: 12px;
    }

    .qr .missing {
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px dashed var(--line-strong);
      color: var(--muted);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      padding: 18px;
      background: transparent;
    }

    .qr.fail img { display: none; }
    .qr.fail .missing { display: flex; }

    .info {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .url-card {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-height: 82px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .label {
      font-size: 16px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0;
    }

    .value {
      min-width: 0;
      word-break: break-all;
      line-height: 1.28;
      font-size: clamp(16px, 1.8vw, 22px);
      font-weight: 700;
      color: var(--text);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 2px;
    }

    .action {
      display: grid;
      place-items: center;
      min-height: 78px;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: var(--button);
      color: var(--text);
      text-decoration: none;
      text-align: center;
      font-size: clamp(20px, 2.4vw, 30px);
      font-weight: 800;
      line-height: 1.1;
    }

    .action.primary {
      background: var(--button-strong);
      color: #111;
    }

    .service-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .service-button {
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #2b332e;
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
    }

    .service-button.stopping {
      opacity: 0.62;
    }

    .meta {
      display: grid;
      gap: 6px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      padding: 0 2px;
    }

    @media (max-width: 900px) {
      body { padding: 14px; }

      .page {
        grid-template-columns: 1fr;
        gap: 14px;
        align-content: start;
        min-height: auto;
      }

      .qr {
        width: min(100%, 460px);
        margin: 0 auto;
        padding: 14px;
      }

      .qr img,
      .qr .missing {
        min-height: 220px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .service-actions {
        justify-content: stretch;
      }

      .service-button {
        width: 100%;
      }

      .url-card {
        grid-template-columns: 1fr;
        min-height: 76px;
        gap: 6px;
      }

      .action {
        min-height: 72px;
        font-size: clamp(18px, 5vw, 26px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="qr" id="qrBox">
      <img id="qrImage" alt="二维码">
      <div class="missing">二维码加载失败</div>
    </section>

    <section class="info">
      <div class="url-card">
        <div class="label">控制端网址</div>
        <div class="value" id="controlUrl">-</div>
      </div>

      <div class="url-card">
        <div class="label">被控端网址</div>
        <div class="value" id="displayUrl">-</div>
      </div>

      <div class="actions">
        <a class="action primary" id="enterControl" href="/chroma-cross-screen.html?mode=control">进入控制端</a>
        <a class="action" id="enterDisplay" href="/chroma-cross-screen.html?mode=display">进入被控端</a>
      </div>

      <div class="service-actions">
        <button class="service-button" id="stopServerBtn" type="button">停止服务</button>
      </div>

      <div class="meta">
        <div id="launchUrl">正在检测启动地址...</div>
        <div>手机可直接扫码，也可以点按钮进入</div>
      </div>
    </section>
  </main>

  <script>
    const qrBox = document.getElementById("qrBox");
    const qrImage = document.getElementById("qrImage");
    document.querySelectorAll("img").forEach((element) => {
      element.setAttribute("draggable", "false");
    });

    ["contextmenu", "dragstart", "selectstart", "dblclick"].forEach((eventName) => {
      document.addEventListener(eventName, (event) => {
        if (event.target?.closest?.("input, textarea, select, [contenteditable='true']")) return;
        event.preventDefault();
        if (eventName === "dblclick") window.getSelection?.()?.removeAllRanges?.();
      }, { passive: false });
    });

    qrImage.addEventListener("error", () => qrBox.classList.add("fail"));

    function applyUrls(baseUrl) {
      const root = baseUrl.replace(/\/chroma-launch\.html$/, "");
      const controlUrl = `${root}/chroma-cross-screen.html?mode=control`;
      const displayUrl = `${root}/chroma-cross-screen.html?mode=display`;

      document.getElementById("launchUrl").textContent = baseUrl;
      document.getElementById("controlUrl").textContent = controlUrl;
      document.getElementById("displayUrl").textContent = displayUrl;
      document.getElementById("enterControl").href = controlUrl;
      document.getElementById("enterDisplay").href = displayUrl;
      qrImage.src = `/qr.svg?text=${encodeURIComponent(baseUrl)}`;
    }

    async function loadLanUrls() {
      try {
        const response = await fetch("/api/info", { cache: "no-store" });
        if (!response.ok) throw new Error("info");
        const info = await response.json();
        applyUrls(info.url);
      } catch (_) {
        applyUrls(`${location.origin}/chroma-launch.html`);
      }
    }

    loadLanUrls();

    document.getElementById("stopServerBtn").addEventListener("click", async (event) => {
      const button = event.currentTarget;
      button.disabled = true;
      button.classList.add("stopping");
      button.textContent = "正在停止...";
      try {
        await fetch("/api/shutdown", { method: "POST" });
        button.textContent = "服务已停止";
      } catch (_) {
        button.textContent = "停止失败";
        button.disabled = false;
        button.classList.remove("stopping");
      }
    });
  </script>
</body>
</html>
