<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>纯色投放十字屏</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    img,
    canvas {
      -webkit-user-drag: none;
      user-drag: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      inset: 0;
    }

    body.locked {
      cursor: none;
    }

    body.control-mode {
      background: #101812;
      touch-action: auto;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }

    body.control-mode #stage,
    body.control-mode .hot-corner {
      display: none;
    }

    .panel {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      max-height: min(72vh, 620px);
      overflow: auto;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(18, 20, 24, 0.9);
      color: #fff;
      backdrop-filter: blur(16px);
      box-shadow: 0 14px 50px rgba(0, 0, 0, 0.32);
      transition: opacity 0.18s ease, transform 0.18s ease;
      touch-action: auto;
      user-select: none;
      -webkit-user-select: none;
    }

    body.control-mode .panel {
      top: max(12px, env(safe-area-inset-top));
      bottom: max(12px, env(safe-area-inset-bottom));
      max-height: none;
      background: #17221a;
      box-shadow: none;
      backdrop-filter: none;
    }

    body.locked .panel {
      pointer-events: none;
      opacity: 0;
      transform: translateY(16px);
    }

    body.control-mode.locked .panel {
      pointer-events: auto;
      opacity: 1;
      transform: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    body.control-mode .topbar {
      display: none;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 700;
    }

    .readout {
      color: rgba(255, 255, 255, 0.68);
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 7px;
      min-height: 38px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    button.primary {
      background: #fff;
      color: #111;
      font-weight: 700;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .preset-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 8px;
    }

    .preset-toolbar input {
      min-width: 0;
      min-height: 40px;
      padding: 0 11px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 7px;
      outline: none;
      background: rgba(0, 0, 0, 0.24);
      color: #fff;
      user-select: text;
      -webkit-user-select: text;
    }

    .preset-toolbar input:focus {
      border-color: rgba(255, 255, 255, 0.52);
    }

    .preset-toolbar button {
      background: rgba(255, 255, 255, 0.18);
      font-weight: 700;
    }

    .preset-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px;
      gap: 5px;
      min-width: 0;
    }

    .preset {
      display: grid;
      grid-template-columns: 32px 1fr;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 6px 8px;
      text-align: left;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.1);
    }

    .preset-delete {
      min-width: 38px;
      padding: 0;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.08);
      font-size: 22px;
      line-height: 1;
    }

    .preset-empty {
      grid-column: 1 / -1;
      padding: 12px;
      color: rgba(255, 255, 255, 0.58);
      text-align: center;
      font-size: 13px;
    }

    .swatch {
      width: 32px;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 5px;
      position: relative;
      overflow: hidden;
    }

    .swatch::before,
    .swatch::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--cross);
    }

    .swatch::before {
      width: 18px;
      height: 5px;
    }

    .swatch::after {
      width: 5px;
      height: 18px;
    }

    .controls {
      display: grid;
      gap: 9px;
    }

    .row {
      display: grid;
      grid-template-columns: 88px 1fr 52px;
      align-items: center;
      gap: 9px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #fff;
    }

    input[type="color"] {
      width: 52px;
      height: 32px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 6px;
      background: transparent;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    body.control-mode #exportPngBtn {
      display: none;
    }

    .hot-corner {
      position: fixed;
      left: 0;
      top: 0;
      width: 22vw;
      height: 18vh;
      z-index: 5;
      touch-action: none;
    }

    .launcher {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(7, 8, 10, 0.84);
      color: #fff;
      touch-action: auto;
    }

    .launcher.hidden {
      display: none;
    }

    .launcher-card {
      width: min(520px, 100%);
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(24, 26, 31, 0.96);
    }

    .launcher-card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .launcher-card p {
      margin: 0 0 12px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      line-height: 1.45;
    }

    .address-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 13px;
      word-break: break-all;
    }

    .qr-box {
      display: grid;
      grid-template-columns: 132px 1fr;
      gap: 12px;
      align-items: center;
      margin: 12px 0;
    }

    .qr-box img {
      width: 132px;
      height: 132px;
      border-radius: 6px;
      background: #fff;
      padding: 8px;
    }

    .qr-box.unavailable img {
      display: none;
    }

    .qr-placeholder {
      display: none;
      width: 132px;
      min-height: 132px;
      place-items: center;
      padding: 12px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.72);
      text-align: center;
      font-size: 13px;
      line-height: 1.4;
    }

    .qr-box.unavailable .qr-placeholder {
      display: grid;
    }

    .role-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .role-actions button:first-child {
      grid-column: 1 / -1;
    }

    .status-pill {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      z-index: 6;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.46);
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      pointer-events: none;
    }

    .device-manager {
      display: none;
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
    }

    body.control-mode .device-manager {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .control-quickconnect {
      display: none;
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
    }

    body.control-mode .control-quickconnect {
      display: grid;
      gap: 10px;
    }

    .control-quickconnect-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.84);
      font-size: 13px;
      font-weight: 700;
    }

    .quickconnect-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control-quickconnect-body {
      display: grid;
      grid-template-columns: 104px 1fr;
      gap: 10px;
      align-items: center;
    }

    .control-quickconnect img {
      width: 104px;
      height: 104px;
      border-radius: 6px;
      background: #fff;
      padding: 6px;
    }

    .control-quickconnect .quickconnect-meta {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .control-quickconnect .quickconnect-url {
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      line-height: 1.4;
      word-break: break-all;
    }

    .device-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.84);
      font-size: 13px;
      font-weight: 700;
    }

    .device-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .device-rename {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.06);
    }

    .device-rename span {
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      font-weight: 700;
    }

    .device-rename .current-device {
      grid-column: 1 / -1;
      color: rgba(255, 255, 255, 0.56);
      font-size: 12px;
      line-height: 1.35;
      word-break: break-all;
    }

    .device-rename input {
      min-width: 0;
      width: 100%;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 7px;
      background: rgba(0, 0, 0, 0.26);
      color: #fff;
    }

    .device-rename input:disabled {
      opacity: 0.45;
    }

    .device-list {
      display: grid;
      gap: 6px;
      max-height: 130px;
      overflow: auto;
    }

    .device-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 42px;
      padding: 7px 8px;
      text-align: left;
      background: rgba(255, 255, 255, 0.1);
    }

    .device-item.active {
      outline: 2px solid rgba(255, 255, 255, 0.85);
    }

    .device-item small {
      display: block;
      margin-top: 2px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      line-height: 1.25;
    }

    .online-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #28d968;
    }

    .online-dot.offline {
      background: #777;
    }

    .preview-canvas {
      width: min(170px, 100%);
      aspect-ratio: 9 / 16;
      border-radius: 6px;
      background: #111;
      display: block;
      justify-self: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    body.locked .status-pill {
      opacity: 0;
    }

    @media (max-width: 520px) {
      .preset-grid {
        grid-template-columns: 1fr;
      }
    }

    .name-dialog {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      background: rgba(7, 12, 9, 0.86);
      backdrop-filter: blur(12px);
      touch-action: auto;
    }

    .name-dialog.hidden {
      display: none;
    }

    .name-dialog-card {
      display: grid;
      gap: 14px;
      width: min(420px, 100%);
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: #17221a;
      color: #fff;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
    }

    .name-dialog-card h2 {
      margin: 0;
      font-size: 22px;
    }

    .name-dialog-card p {
      margin: 0;
      color: rgba(255, 255, 255, 0.66);
      font-size: 14px;
      line-height: 1.5;
    }

    .name-dialog-card input {
      width: 100%;
      min-height: 48px;
      padding: 0 13px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 7px;
      outline: none;
      background: rgba(0, 0, 0, 0.28);
      color: #fff;
      user-select: text;
      -webkit-user-select: text;
      touch-action: manipulation;
    }

    .name-dialog-card input:focus {
      border-color: rgba(255, 255, 255, 0.58);
    }

    .name-dialog-card button {
      min-height: 48px;
      background: #f4f4f0;
      color: #111;
      font-weight: 800;
    }

    @media (min-width: 760px) {
      .panel {
        left: auto;
        width: 430px;
      }

      body.control-mode .panel {
        left: max(12px, env(safe-area-inset-left));
        right: auto;
        width: 430px;
      }
    }
  </style>
</head>
<body>
  <canvas id="stage" aria-label="纯色背景和定位十字"></canvas>
  <div class="hot-corner" id="hotCorner"></div>
  <div class="status-pill" id="statusPill">本地</div>

  <div class="name-dialog hidden" id="displayNameDialog" role="dialog" aria-modal="true" aria-labelledby="displayNameTitle">
    <form class="name-dialog-card" id="displayNameForm">
      <h2 id="displayNameTitle">设置被控端名称</h2>
      <p>这个名称会显示在控制端设备清单中，之后也可以在控制端修改。</p>
      <input id="displayNameInput" type="text" maxlength="40" autocomplete="off" enterkeyhint="done" aria-label="被控端名称">
      <button type="submit">确认并进入被控端</button>
    </form>
  </div>

  <section class="launcher" id="launcher">
    <div class="launcher-card">
      <h2>选择启动方式</h2>
      <p>本地投放只控制当前手机；投放端会接收控制端参数；控制端用于远程切换颜色和十字位置。</p>
      <div class="address-box">
        <span id="lanAddress">正在检测内网地址...</span>
        <button id="copyAddressBtn">复制</button>
      </div>
      <div class="qr-box">
        <img id="qrImage" alt="扫码进入网页">
        <div class="qr-placeholder" id="qrPlaceholder">需要通过控制服务打开后显示二维码</div>
        <p>用另一台手机扫码进入同一个页面，再选择“作为投放端”或“作为控制端”。如果二维码未显示，请用上方地址手动打开。</p>
      </div>
      <div class="role-actions">
        <button class="primary" id="localModeBtn">本地投放</button>
        <button id="displayModeBtn">作为投放端</button>
        <button id="controlModeBtn">作为控制端</button>
      </div>
    </div>
  </section>

  <section class="panel" id="panel">
    <div class="topbar">
      <div class="title">
        <h1>纯色投放十字屏</h1>
        <div class="readout" id="readout"></div>
      </div>
      <button class="primary" id="lockBtn">锁定投放</button>
    </div>

    <div class="control-quickconnect" id="controlQuickconnect">
      <div class="control-quickconnect-title">
        <span>快速连接</span>
        <div class="quickconnect-actions">
          <button id="copyControlUrlBtn">复制地址</button>
          <button id="stopServerBtn">停止服务</button>
        </div>
      </div>
      <div class="control-quickconnect-body">
        <img id="controlQrImage" alt="控制端二维码">
        <div class="quickconnect-meta">
          <div class="quickconnect-url" id="controlUrlText">正在检测内网地址...</div>
          <button id="openControlUrlBtn">打开当前控制地址</button>
        </div>
      </div>
    </div>

    <div class="device-manager" id="deviceManager">
      <div class="device-title">
        <span>设备管理</span>
        <div class="device-actions">
          <button id="forceLockBtn">远程锁定</button>
          <button id="refreshDevicesBtn">刷新</button>
        </div>
      </div>
    <div class="device-rename">
      <span>设备名称</span>
      <input id="deviceNameInput" type="text" maxlength="40" placeholder="选择设备后可修改名称" disabled>
      <button id="saveDeviceNameBtn" disabled>保存</button>
      <div class="current-device" id="currentDeviceLabel">当前未选择设备</div>
    </div>
      <div class="device-list" id="deviceList"></div>
      <canvas class="preview-canvas" id="previewCanvas" aria-label="选中设备投放预览"></canvas>
    </div>

    <div class="preset-toolbar">
      <input id="presetNameInput" type="text" maxlength="40" placeholder="输入新预设名称" autocomplete="off">
      <button id="savePresetBtn">保存当前设置</button>
    </div>
    <div class="preset-grid" id="presets"></div>

    <div class="controls">
      <label class="row">
        <span>背景颜色</span>
        <input id="bgColor" type="color" value="#00ff00">
        <span></span>
      </label>
      <label class="row">
        <span>背景明度</span>
        <input id="bgBrightness" type="range" min="0" max="100" value="100">
        <span id="bgBrightnessValue"></span>
      </label>
      <label class="row">
        <span>十字颜色</span>
        <input id="crossColor" type="color" value="#0040d8">
        <span></span>
      </label>
      <label class="row">
        <span>十字明度</span>
        <input id="crossBrightness" type="range" min="0" max="100" value="100">
        <span id="crossBrightnessValue"></span>
      </label>
      <label class="row">
        <span>十字大小</span>
        <input id="crossSize" type="range" min="2" max="16" step="0.5" value="6">
        <span id="crossSizeValue"></span>
      </label>
      <label class="row">
        <span>线条粗细</span>
        <input id="crossThickness" type="range" min="0.4" max="5" step="0.1" value="1.4">
        <span id="crossThicknessValue"></span>
      </label>
      <label class="row">
        <span>边距比例</span>
        <input id="edgeRatio" type="range" min="5" max="30" step="0.5" value="10">
        <span id="edgeRatioValue"></span>
      </label>
      <label class="row">
        <span>中心高度</span>
        <input id="centerY" type="range" min="35" max="65" step="0.5" value="50">
        <span id="centerYValue"></span>
      </label>
      <label class="row">
        <span>随机点数</span>
        <input id="randomPointCount" type="range" min="4" max="80" step="1" value="12">
        <span id="randomPointCountValue"></span>
      </label>
    </div>

    <div class="actions">
      <button id="defaultBtn">恢复默认点位</button>
      <button id="blackoutBtn">纯黑待机</button>
      <button id="crossToggleBtn">隐藏十字</button>
      <button id="randomPointsBtn">开启随机点</button>
      <button id="exportPngBtn">导出 PNG</button>
    </div>
  </section>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d", { alpha: false });
    const panel = document.getElementById("panel");
    const readout = document.getElementById("readout");
    const lockBtn = document.getElementById("lockBtn");
    const hotCorner = document.getElementById("hotCorner");
    const launcher = document.getElementById("launcher");
    const lanAddress = document.getElementById("lanAddress");
    const qrImage = document.getElementById("qrImage");
    const qrBox = document.querySelector(".qr-box");
    const statusPill = document.getElementById("statusPill");
    const controlQuickconnect = document.getElementById("controlQuickconnect");
    const controlQrImage = document.getElementById("controlQrImage");
    const controlUrlText = document.getElementById("controlUrlText");
    const deviceList = document.getElementById("deviceList");
    const previewCanvas = document.getElementById("previewCanvas");
    const previewCtx = previewCanvas.getContext("2d", { alpha: false });
    const forceLockBtn = document.getElementById("forceLockBtn");
    const stopServerBtn = document.getElementById("stopServerBtn");
    const deviceNameInput = document.getElementById("deviceNameInput");
    const saveDeviceNameBtn = document.getElementById("saveDeviceNameBtn");
    const currentDeviceLabel = document.getElementById("currentDeviceLabel");
    const crossToggleBtn = document.getElementById("crossToggleBtn");
    const randomPointsBtn = document.getElementById("randomPointsBtn");
    const exportPngBtn = document.getElementById("exportPngBtn");
    const displayNameDialog = document.getElementById("displayNameDialog");
    const displayNameForm = document.getElementById("displayNameForm");
    const displayNameInput = document.getElementById("displayNameInput");
    const presetNameInput = document.getElementById("presetNameInput");
    const savePresetBtn = document.getElementById("savePresetBtn");
    const presetGrid = document.getElementById("presets");

    const controls = {
      bgColor: document.getElementById("bgColor"),
      bgBrightness: document.getElementById("bgBrightness"),
      crossColor: document.getElementById("crossColor"),
      crossBrightness: document.getElementById("crossBrightness"),
      crossSize: document.getElementById("crossSize"),
      crossThickness: document.getElementById("crossThickness"),
      edgeRatio: document.getElementById("edgeRatio"),
      centerY: document.getElementById("centerY"),
      randomPointCount: document.getElementById("randomPointCount")
    };

    const outputIds = [
      "bgBrightness",
      "crossBrightness",
      "crossSize",
      "crossThickness",
      "edgeRatio",
      "centerY",
      "randomPointCount"
    ];

    const outputs = Object.fromEntries(
      outputIds.map((id) => [id, document.getElementById(`${id}Value`)])
    );

    let presets = [];

    let wakeLock = null;
    let locked = false;
    let role = "local";
    let serverMode = location.protocol.startsWith("http");
    let syncTimer = 0;
    let deviceTimer = 0;
    let heartbeatTimer = 0;
    let applyingRemote = false;
    let selectedDeviceId = "";
    let selectedDeviceInfo = null;
    let selectedDeviceState = null;
    let selectedDeviceNameId = "";
    let selectedDeviceNameDraft = "";
    let selectedDeviceNameLocked = false;
    let deviceForceLock = "0";
    let lastLockCommandId = "0";
    let lockedByRemote = false;
    let deviceNameFocused = false;
    let cornerTapCount = 0;
    let cornerTimer = 0;
    const deviceId = getDeviceId();

    function hexToRgb(hex) {
      const value = hex.replace("#", "");
      return {
        r: parseInt(value.slice(0, 2), 16),
        g: parseInt(value.slice(2, 4), 16),
        b: parseInt(value.slice(4, 6), 16)
      };
    }

    function colorWithBrightness(hex, brightness) {
      const rgb = hexToRgb(hex);
      const level = Number(brightness) / 100;
      return `rgb(${Math.round(rgb.r * level)}, ${Math.round(rgb.g * level)}, ${Math.round(rgb.b * level)})`;
    }

    function getDeviceId() {
      const key = "chromaCrossDeviceId";
      let id = localStorage.getItem(key);
      if (!id) {
        id = `dev-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
        localStorage.setItem(key, id);
      }
      return id;
    }

    function deviceName() {
      const savedName = localStorage.getItem(`chromaCrossDeviceName:${deviceId}`);
      if (savedName) return savedName;
      const platform = navigator.platform || "设备";
      return `${platform} ${deviceId.slice(-4)}`;
    }

    function saveLocalDeviceName(name) {
      const cleanName = String(name || "").trim().slice(0, 40);
      if (cleanName) localStorage.setItem(`chromaCrossDeviceName:${deviceId}`, cleanName);
      return cleanName;
    }

    function requestDisplayName() {
      displayNameInput.value = deviceName();
      displayNameDialog.classList.remove("hidden");
      requestAnimationFrame(() => {
        displayNameInput.focus();
        displayNameInput.select();
      });
      return new Promise((resolve) => {
        displayNameForm.onsubmit = (event) => {
          event.preventDefault();
          const name = saveLocalDeviceName(displayNameInput.value);
          if (!name) {
            displayNameInput.focus();
            return;
          }
          displayNameDialog.classList.add("hidden");
          resolve(name);
        };
      });
    }

    function state() {
      return {
        bgColor: controls.bgColor.value,
        bgBrightness: controls.bgBrightness.value,
        crossColor: controls.crossColor.value,
        crossBrightness: controls.crossBrightness.value,
        crossSize: controls.crossSize.value,
        crossThickness: controls.crossThickness.value,
        edgeRatio: controls.edgeRatio.value,
        centerY: controls.centerY.value,
        hideCross: document.body.dataset.hideCross || "0",
        randomPoints: document.body.dataset.randomPoints || "0",
        randomSeed: document.body.dataset.randomSeed || "",
        randomPointCount: controls.randomPointCount.value
      };
    }

    function currentStateWithFlags() {
      return {
        ...state(),
        forceLock: selectedDeviceState?.forceLock || "0",
        displayLocked: selectedDeviceState?.displayLocked || "0",
        lockCommand: selectedDeviceState?.lockCommand || "none",
        lockCommandId: selectedDeviceState?.lockCommandId || "0",
        hideCross: selectedDeviceState?.hideCross || document.body.dataset.hideCross || "0",
        randomPoints: selectedDeviceState?.randomPoints || document.body.dataset.randomPoints || "0",
        randomSeed: selectedDeviceState?.randomSeed || document.body.dataset.randomSeed || "",
        randomPointCount: selectedDeviceState?.randomPointCount || controls.randomPointCount.value
      };
    }

    function setState(next) {
      applyingRemote = true;
      Object.entries(next).forEach(([key, value]) => {
        if (controls[key] && value !== undefined) controls[key].value = value;
        if (key === "hideCross" && value !== undefined) {
          document.body.dataset.hideCross = String(value === "1" || value === 1 || value === true ? "1" : "0");
        }
        if (key === "randomPoints" && value !== undefined) {
          document.body.dataset.randomPoints = String(value === "1" || value === 1 || value === true ? "1" : "0");
        }
        if (key === "randomSeed" && value !== undefined) {
          document.body.dataset.randomSeed = String(value || "");
        }
      });
      applyingRemote = false;
      render();
    }

    function makeRandomSeed() {
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function seedToNumber(seed) {
      let value = 2166136261;
      String(seed || "chroma-random-points").split("").forEach((char) => {
        value ^= char.charCodeAt(0);
        value = Math.imul(value, 16777619);
      });
      return value >>> 0;
    }

    function seededRandom(seed) {
      let value = seedToNumber(seed);
      return () => {
        value = Math.imul(1664525, value) + 1013904223;
        return (value >>> 0) / 4294967296;
      };
    }

    function clampNumber(value, min, max) {
      return Math.min(max, Math.max(min, Number(value) || min));
    }

    function isFarEnough(candidate, points, minDistance) {
      return points.every(([x, y]) => {
        const dx = candidate[0] - x;
        const dy = candidate[1] - y;
        return Math.hypot(dx, dy) >= minDistance;
      });
    }

    function drawStateToContext(targetCtx, width, height, s) {
      const bg = colorWithBrightness(s.bgColor, s.bgBrightness);
      const cross = colorWithBrightness(s.crossColor, s.crossBrightness);
      const base = Math.min(width, height);
      const size = base * (Number(s.crossSize) / 100);
      const thickness = Math.max(1, base * (Number(s.crossThickness) / 100));
      const inset = base * (Number(s.edgeRatio) / 100);
      const centerY = height * (Number(s.centerY) / 100);

      targetCtx.fillStyle = bg;
      targetCtx.fillRect(0, 0, width, height);
      if (String(s.hideCross || "0") === "1") return;
      targetCtx.fillStyle = cross;
      const basePoints = [
        [inset, inset],
        [width - inset, inset],
        [width / 2, centerY],
        [inset, height - inset],
        [width - inset, height - inset]
      ];
      const points = [...basePoints];
      if (String(s.randomPoints || "0") === "1") {
        const random = seededRandom(`${s.randomSeed || "default"}:${width}x${height}`);
        const count = clampNumber(s.randomPointCount, 4, 80);
        const margin = Math.max(size, base * 0.04);
        const availableArea = Math.max(1, (width - margin * 2) * (height - margin * 2));
        const spacingByArea = Math.sqrt(availableArea / Math.max(1, count + basePoints.length)) * 0.78;
        const minDistance = Math.max(size * 1.9, Math.min(base * 0.15, spacingByArea));
        let placed = 0;
        let attempts = 0;
        const maxAttempts = count * 160;
        while (placed < count && attempts < maxAttempts) {
          attempts += 1;
          const candidate = [
            margin + random() * Math.max(1, width - margin * 2),
            margin + random() * Math.max(1, height - margin * 2),
            0.72
          ];
          if (!isFarEnough(candidate, points, minDistance)) continue;
          points.push(candidate);
          placed += 1;
        }
      }
      points.forEach(([x, y, scale = 1]) => {
        const pointSize = size * scale;
        const pointThickness = Math.max(1, thickness * scale);
        targetCtx.fillRect(Math.round(x - pointSize / 2), Math.round(y - pointThickness / 2), Math.round(pointSize), Math.round(pointThickness));
        targetCtx.fillRect(Math.round(x - pointThickness / 2), Math.round(y - pointSize / 2), Math.round(pointThickness), Math.round(pointSize));
      });
    }

    function drawCross(x, y, size, thickness, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x - size / 2), Math.round(y - thickness / 2), Math.round(size), Math.round(thickness));
      ctx.fillRect(Math.round(x - thickness / 2), Math.round(y - size / 2), Math.round(thickness), Math.round(size));
    }

    function render() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const w = Math.max(1, Math.round(window.innerWidth));
      const h = Math.max(1, Math.round(window.innerHeight));
      const pixelW = Math.round(w * dpr);
      const pixelH = Math.round(h * dpr);

      if (canvas.width !== pixelW || canvas.height !== pixelH) {
        canvas.width = pixelW;
        canvas.height = pixelH;
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;
      }

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const s = state();
      drawStateToContext(ctx, w, h, s);

      outputs.bgBrightness.textContent = `${s.bgBrightness}%`;
      outputs.crossBrightness.textContent = `${s.crossBrightness}%`;
      outputs.crossSize.textContent = `${s.crossSize}%`;
      outputs.crossThickness.textContent = `${s.crossThickness}%`;
      outputs.edgeRatio.textContent = `${s.edgeRatio}%`;
      outputs.centerY.textContent = `${s.centerY}%`;
      outputs.randomPointCount.textContent = s.randomPointCount;
      readout.textContent = `${w} x ${h} CSS px | ${pixelW} x ${pixelH} device px | DPR ${dpr}`;
      renderPreview(s);
      updateCrossToggleButton();
      updateRandomPointsButton();
    }

    function updateStatus(text) {
      statusPill.textContent = text;
    }

    function exportFileName() {
      const now = new Date();
      const pad = (value) => String(value).padStart(2, "0");
      return `chroma-screen-${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.png`;
    }

    function fullscreenExportSize() {
      let width = Math.max(1, Math.round(Number(window.screen?.width) || window.innerWidth));
      let height = Math.max(1, Math.round(Number(window.screen?.height) || window.innerHeight));
      const viewportIsLandscape = window.innerWidth > window.innerHeight;
      const screenIsLandscape = width > height;
      if (viewportIsLandscape !== screenIsLandscape) [width, height] = [height, width];
      return {
        width: Math.max(width, Math.round(window.innerWidth)),
        height: Math.max(height, Math.round(window.innerHeight))
      };
    }

    async function exportPng() {
      exportPngBtn.disabled = true;
      exportPngBtn.textContent = "正在导出";
      try {
        const cssSize = fullscreenExportSize();
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const exportCanvas = document.createElement("canvas");
        exportCanvas.width = Math.round(cssSize.width * dpr);
        exportCanvas.height = Math.round(cssSize.height * dpr);
        const exportContext = exportCanvas.getContext("2d", { alpha: false });
        exportContext.setTransform(dpr, 0, 0, dpr, 0, 0);
        drawStateToContext(exportContext, cssSize.width, cssSize.height, state());
        const blob = await new Promise((resolve, reject) => {
          exportCanvas.toBlob((result) => result ? resolve(result) : reject(new Error("png")), "image/png");
        });
        const fileName = exportFileName();
        const exportedPixels = `${exportCanvas.width} x ${exportCanvas.height}`;

        if (typeof window.showSaveFilePicker === "function") {
          const handle = await window.showSaveFilePicker({
            suggestedName: fileName,
            types: [{ description: "PNG 图片", accept: { "image/png": [".png"] } }]
          });
          const writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();
          updateStatus(`PNG 已保存 ${exportedPixels}`);
          return;
        }

        const file = new File([blob], fileName, { type: "image/png" });
        if (navigator.share && navigator.canShare?.({ files: [file] })) {
          await navigator.share({ files: [file], title: fileName });
          updateStatus(`PNG 已导出 ${exportedPixels}`);
          return;
        }

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.append(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        updateStatus(`PNG 已下载 ${exportedPixels}`);
      } catch (error) {
        updateStatus(error?.name === "AbortError" ? "已取消导出" : "PNG 导出失败");
      } finally {
        exportPngBtn.disabled = false;
        exportPngBtn.textContent = "导出 PNG";
      }
    }

    function applyPreset(preset) {
      setState(preset.state || {});
      if (role === "control") {
        selectedDeviceState = { ...(selectedDeviceState || {}), ...(preset.state || {}) };
      }
      publishState();
    }

    function buildPresets() {
      presetGrid.innerHTML = "";
      if (!presets.length) {
        const empty = document.createElement("div");
        empty.className = "preset-empty";
        empty.textContent = "暂无预设，可保存当前设置创建一个";
        presetGrid.append(empty);
        return;
      }
      presets.forEach((preset) => {
        const item = document.createElement("div");
        item.className = "preset-item";
        const button = document.createElement("button");
        button.className = "preset";
        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = colorWithBrightness(preset.state.bgColor, preset.state.bgBrightness);
        swatch.style.setProperty("--cross", String(preset.state.hideCross || "0") === "1"
          ? "transparent"
          : colorWithBrightness(preset.state.crossColor, preset.state.crossBrightness));
        const label = document.createElement("span");
        label.textContent = preset.name;
        button.append(swatch, label);
        button.addEventListener("click", () => applyPreset(preset));
        const deleteButton = document.createElement("button");
        deleteButton.className = "preset-delete";
        deleteButton.type = "button";
        deleteButton.textContent = "×";
        deleteButton.title = `删除预设：${preset.name}`;
        deleteButton.setAttribute("aria-label", `删除预设：${preset.name}`);
        deleteButton.addEventListener("click", () => deletePreset(preset));
        item.append(button, deleteButton);
        presetGrid.append(item);
      });
    }

    async function loadPresets() {
      if (!serverMode) {
        try {
          presets = JSON.parse(localStorage.getItem("chromaCrossPresets") || "[]");
        } catch (_) {
          presets = [];
        }
        buildPresets();
        return;
      }
      try {
        const response = await fetch("/api/presets", { cache: "no-store" });
        if (!response.ok) throw new Error("presets");
        const result = await response.json();
        presets = result.presets || [];
        buildPresets();
      } catch (_) {
        updateStatus("预设加载失败");
      }
    }

    async function saveCurrentPreset() {
      const name = presetNameInput.value.trim().slice(0, 40);
      if (!name) {
        updateStatus("请先输入预设名称");
        presetNameInput.focus();
        return;
      }
      savePresetBtn.disabled = true;
      const presetState = state();
      try {
        if (serverMode) {
          const response = await fetch("/api/presets", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ name, state: presetState })
          });
          if (!response.ok) throw new Error("save");
          const result = await response.json();
          presets = result.presets || presets;
        } else {
          presets.push({ id: `local-${Date.now()}`, name, state: presetState });
          localStorage.setItem("chromaCrossPresets", JSON.stringify(presets));
        }
        presetNameInput.value = "";
        buildPresets();
        updateStatus(`已保存预设：${name}`);
      } catch (_) {
        updateStatus("预设保存失败");
      } finally {
        savePresetBtn.disabled = false;
      }
    }

    async function deletePreset(preset) {
      if (!window.confirm(`确定删除预设“${preset.name}”吗？`)) return;
      try {
        if (serverMode) {
          const response = await fetch("/api/presets/delete", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ id: preset.id })
          });
          if (!response.ok) throw new Error("delete");
          const result = await response.json();
          presets = result.presets || [];
        } else {
          presets = presets.filter((item) => item.id !== preset.id);
          localStorage.setItem("chromaCrossPresets", JSON.stringify(presets));
        }
        buildPresets();
        updateStatus(`已删除预设：${preset.name}`);
      } catch (_) {
        updateStatus("预设删除失败");
      }
    }

    async function requestWakeLock() {
      if (!("wakeLock" in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request("screen");
      } catch (_) {
        wakeLock = null;
      }
    }

    function pushExitGuard() {
      try {
        history.pushState({ projectionLocked: true }, "");
      } catch (_) {}
    }

    async function lockProjection(options = {}) {
      lockedByRemote = !!options.remote;
      locked = true;
      window.chromaDesktop?.setProjectionLocked?.(true);
      document.body.classList.add("locked");
      lockBtn.textContent = "已锁定";
      pushExitGuard();
      const root = document.documentElement;
      if (root.requestFullscreen) {
        try {
          await root.requestFullscreen({ navigationUI: "hide" });
        } catch (_) {}
      }
      await requestWakeLock();
      render();
      if (role === "display") await publishState();
    }

    async function unlockProjection() {
      lockedByRemote = false;
      locked = false;
      deviceForceLock = "0";
      window.chromaDesktop?.setProjectionLocked?.(false);
      document.body.classList.remove("locked");
      lockBtn.textContent = "锁定投放";
      if (document.fullscreenElement && document.exitFullscreen) {
        try {
          await document.exitFullscreen();
        } catch (_) {}
      }
      if (wakeLock) {
        try {
          await wakeLock.release();
        } catch (_) {}
        wakeLock = null;
      }
      render();
      if (role === "display") await publishState();
    }

    function isLockHotkey(event) {
      return event.ctrlKey && event.altKey && event.shiftKey &&
        !event.metaKey && (event.code === "KeyL" || event.key.toLowerCase() === "l");
    }

    async function toggleLockFromHotkey() {
      if (role === "control") {
        if (!selectedDeviceId) {
          updateStatus("请先选择投放端");
          return;
        }
        const deviceLocked = String(selectedDeviceState?.displayLocked || selectedDeviceState?.forceLock || "0") === "1";
        await setRemoteLock(!deviceLocked);
        return;
      }
      if (locked) await unlockProjection();
      else await lockProjection();
    }

    async function stopServer() {
      if (!serverMode) {
        updateStatus("文件模式无法停止服务");
        return;
      }
      stopServerBtn.disabled = true;
      stopServerBtn.textContent = "正在停止";
      try {
        await fetch("/api/shutdown", { method: "POST" });
        updateStatus("服务已停止");
        stopServerBtn.textContent = "服务已停止";
      } catch (_) {
        updateStatus("停止失败");
        stopServerBtn.disabled = false;
        stopServerBtn.textContent = "停止服务";
      }
    }

    async function publishState() {
      if (!serverMode || applyingRemote) return;
      const targetDeviceId = role === "control" ? selectedDeviceId : role === "display" ? deviceId : "";
      if (!targetDeviceId) return;
      const nextState = role === "control"
        ? currentStateWithFlags()
        : {
            ...state(),
            forceLock: deviceForceLock,
            displayLocked: locked ? "1" : "0",
            lockCommand: "none",
            lockCommandId: lastLockCommandId
          };
      try {
        await fetch(`/api/state?deviceId=${encodeURIComponent(targetDeviceId)}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(nextState)
        });
        if (role === "control") updateStatus(`控制端 已同步 ${targetDeviceId.slice(-4)}`);
      } catch (_) {
        updateStatus(role === "control" ? "控制端 离线" : "投放端 离线");
      }
    }

    async function pullState() {
      if (!serverMode || role !== "display") return;
      try {
        await registerDevice();
        const response = await fetch(`/api/state?deviceId=${encodeURIComponent(deviceId)}`, { cache: "no-store" });
        if (!response.ok) throw new Error("state");
        const next = await response.json();
        deviceForceLock = String(next.forceLock || "0");
        setState(next);
        const commandId = String(next.lockCommandId || "0");
        const command = String(next.lockCommand || "none");
        if (commandId !== "0" && commandId !== lastLockCommandId) {
          lastLockCommandId = commandId;
          if (command === "lock" && !locked) {
            await lockProjection({ remote: true });
          }
          if (command === "unlock" && locked) {
            await unlockProjection();
          }
        }
        updateStatus("投放端 已连接");
      } catch (_) {
        updateStatus("投放端 离线");
      }
    }

    function stopSync() {
      clearInterval(syncTimer);
      clearInterval(deviceTimer);
      clearInterval(heartbeatTimer);
      syncTimer = 0;
      deviceTimer = 0;
      heartbeatTimer = 0;
    }

    async function startRole(nextRole) {
      role = nextRole;
      window.chromaDesktop?.setDisplayMode?.(role === "display");
      document.body.classList.toggle("control-mode", role === "control");
      launcher.classList.add("hidden");
      stopSync();
      if (role === "local") {
        updateStatus("本地");
      }
      if (role === "control") {
        updateStatus("控制端");
        deviceNameFocused = false;
        updateRemoteLockButton();
        loadDevices();
        deviceTimer = setInterval(loadDevices, 1000);
      }
      if (role === "display") {
        updateStatus("投放端");
        await requestDisplayName();
        await registerDevice({ updateName: true });
        heartbeatTimer = setInterval(registerDevice, 1500);
        pullState();
        syncTimer = setInterval(pullState, 250);
      }
    }

    async function registerDevice(options = {}) {
      if (!serverMode || role !== "display") return;
      try {
        const response = await fetch("/api/register", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            id: deviceId,
            name: deviceName(),
            updateName: !!options.updateName,
            role,
            width: window.innerWidth,
            height: window.innerHeight,
            dpr: window.devicePixelRatio || 1,
            userAgent: navigator.userAgent
          })
        });
        if (response.ok) {
          const result = await response.json();
          if (result.name) saveLocalDeviceName(result.name);
          if (result.state && !applyingRemote) setState(result.state);
        }
      } catch (_) {}
    }

    async function loadDevices() {
      if (!serverMode || role !== "control") return;
      try {
        const response = await fetch("/api/devices", { cache: "no-store" });
        const data = await response.json();
        renderDevices(data.devices || []);
      } catch (_) {
        deviceList.innerHTML = '<div class="readout">设备列表离线</div>';
      }
    }

    async function selectDevice(id, deviceState) {
      selectedDeviceId = id;
      selectedDeviceInfo = null;
      selectedDeviceState = deviceState || null;
      selectedDeviceNameId = id;
      selectedDeviceNameDraft = deviceState?.name || selectedDeviceState?.name || "";
      selectedDeviceNameLocked = false;
      if (deviceState) setState(deviceState);
      await loadDeviceState(id);
      await loadDevices();
    }

    async function loadDeviceState(id) {
      try {
        const response = await fetch(`/api/state?deviceId=${encodeURIComponent(id)}`, { cache: "no-store" });
        if (response.ok) {
        selectedDeviceState = await response.json();
        setState(selectedDeviceState);
        updateRemoteLockButton();
        updateCrossToggleButton();
        updateRandomPointsButton();
      }
      } catch (_) {}
    }

    async function setRemoteLock(enabled) {
      if (!selectedDeviceId) return;
      await fetch(`/api/state?deviceId=${encodeURIComponent(selectedDeviceId)}`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          ...state(),
          forceLock: enabled ? "1" : "0",
          displayLocked: enabled ? "1" : "0",
          lockCommand: enabled ? "lock" : "unlock",
          lockCommandId: String(Date.now())
        })
      });
      await loadDeviceState(selectedDeviceId);
      await loadDevices();
    }

    function renderDevices(devices) {
      if (!selectedDeviceId && devices.length) selectedDeviceId = devices[0].id;
      if (!devices.length) {
        deviceList.innerHTML = '<div class="readout">暂无投放端在线</div>';
        selectedDeviceInfo = null;
        selectedDeviceState = null;
        deviceNameInput.value = "";
        deviceNameInput.disabled = true;
        saveDeviceNameBtn.disabled = true;
        deviceNameFocused = false;
        currentDeviceLabel.textContent = "当前未选择设备";
        updateRemoteLockButton();
        renderPreview(state());
        return;
      }
      deviceList.innerHTML = "";
      devices.forEach((device) => {
        const button = document.createElement("button");
        button.className = `device-item${device.id === selectedDeviceId ? " active" : ""}`;
        const age = Math.max(0, Math.round((Date.now() - device.lastSeen) / 1000));
        button.innerHTML = `
          <span>${device.name}<small>${device.width} x ${device.height} | DPR ${device.dpr} | ${age}s 前</small></span>
          <span class="online-dot${device.online ? "" : " offline"}"></span>
        `;
        button.addEventListener("click", () => selectDevice(device.id, device.state));
        deviceList.append(button);
      });
      let selected = devices.find((device) => device.id === selectedDeviceId);
      if (!selected && devices.length) {
        selected = devices[0];
        selectedDeviceId = selected.id;
      }
      if (selected?.state) {
        selectedDeviceInfo = selected;
        selectedDeviceState = selected.state;
        currentDeviceLabel.textContent = `当前设备：${selected.name || selected.id}`;
        if (selectedDeviceNameId !== selected.id) {
          selectedDeviceNameId = selected.id;
          selectedDeviceNameDraft = selected.name || "";
          selectedDeviceNameLocked = false;
        } else if (!selectedDeviceNameLocked && document.activeElement !== deviceNameInput) {
          selectedDeviceNameDraft = selected.name || selectedDeviceNameDraft || "";
        }
        if (!applyingRemote) setState(selectedDeviceState);
        updateRemoteLockButton();
        updateCrossToggleButton();
        updateRandomPointsButton();
        deviceNameInput.disabled = false;
        saveDeviceNameBtn.disabled = false;
        if (document.activeElement !== deviceNameInput) {
          deviceNameInput.value = selectedDeviceNameDraft;
        }
        renderPreview(selected.state);
        if (role === "control" && !deviceNameFocused) {
          deviceNameFocused = true;
          setTimeout(() => {
            deviceNameInput.focus();
            deviceNameInput.select();
          }, 0);
        }
      }
      if (!selected) {
        selectedDeviceInfo = null;
        selectedDeviceState = null;
        selectedDeviceNameId = "";
        selectedDeviceNameDraft = "";
        selectedDeviceNameLocked = false;
        deviceNameInput.value = "";
        deviceNameInput.disabled = true;
        saveDeviceNameBtn.disabled = true;
        deviceNameFocused = false;
        currentDeviceLabel.textContent = "当前未选择设备";
        updateRemoteLockButton();
        updateCrossToggleButton();
        updateRandomPointsButton();
      }
    }

    function updateRemoteLockButton() {
      const deviceLocked = String(selectedDeviceState?.displayLocked || selectedDeviceState?.forceLock || "0") === "1";
      forceLockBtn.textContent = deviceLocked ? "远程解锁" : "远程锁定";
      forceLockBtn.disabled = !selectedDeviceId;
    }

    function updateCrossToggleButton() {
      const active = role === "control"
        ? String(selectedDeviceState?.hideCross || "0") === "1"
        : String(document.body.dataset.hideCross || "0") === "1";
      crossToggleBtn.textContent = active ? "显示十字" : "隐藏十字";
    }

    function updateRandomPointsButton() {
      const active = role === "control"
        ? String(selectedDeviceState?.randomPoints || "0") === "1"
        : String(document.body.dataset.randomPoints || "0") === "1";
      randomPointsBtn.textContent = active ? "关闭随机点" : "开启随机点";
    }

    function renderPreview(s) {
      if (role !== "control") return;
      const rect = previewCanvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const w = Math.max(1, Math.round(rect.width));
      const h = Math.max(1, Math.round(rect.height));
      previewCanvas.width = Math.round(w * dpr);
      previewCanvas.height = Math.round(h * dpr);
      previewCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawStateToContext(previewCtx, w, h, s);
    }

    async function loadServerInfo() {
      if (!serverMode) {
        lanAddress.textContent = "当前是 file:// 文件模式：只能本地投放。请打开启动页地址：http://172.20.10.2:8765/chroma-launch.html";
        qrImage.removeAttribute("src");
        qrBox.classList.add("unavailable");
        controlUrlText.textContent = "请先通过控制服务地址打开页面，当前 file:// 模式不支持二维码。";
        controlQrImage.removeAttribute("src");
        return;
      }
      try {
        const response = await fetch("/api/info", { cache: "no-store" });
        const info = await response.json();
        lanAddress.textContent = info.url;
        qrImage.src = `/qr.svg?text=${encodeURIComponent(info.url)}`;
        qrBox.classList.remove("unavailable");
        controlUrlText.textContent = info.url;
        controlQrImage.src = `/qr.svg?text=${encodeURIComponent(info.url)}`;
      } catch (_) {
        lanAddress.textContent = `控制服务未响应，请确认服务已启动。当前地址：${location.href}`;
        qrImage.removeAttribute("src");
        qrBox.classList.add("unavailable");
        controlUrlText.textContent = `控制服务未响应：${location.href}`;
        controlQrImage.removeAttribute("src");
      }
    }

    render();
    loadPresets();

    Object.values(controls).forEach((control) => {
      control.addEventListener("input", () => {
        render();
        publishState();
      });
    });

    lockBtn.addEventListener("click", () => {
      if (locked) unlockProjection();
      else lockProjection();
    });

    document.getElementById("defaultBtn").addEventListener("click", () => {
      controls.crossSize.value = 6;
      controls.crossThickness.value = 1.4;
      controls.edgeRatio.value = 10;
      controls.centerY.value = 50;
      controls.randomPointCount.value = 12;
      document.body.dataset.randomPoints = "0";
      document.body.dataset.randomSeed = "";
      if (role === "control") {
        selectedDeviceState = {
          ...(selectedDeviceState || {}),
          randomPoints: "0",
          randomSeed: "",
          randomPointCount: "12"
        };
      }
      render();
      publishState();
    });

    document.getElementById("blackoutBtn").addEventListener("click", () => {
      controls.bgColor.value = "#000000";
      controls.bgBrightness.value = 100;
      controls.crossColor.value = "#000000";
      render();
      publishState();
    });

    crossToggleBtn.addEventListener("click", () => {
      const current = role === "control"
        ? String(selectedDeviceState?.hideCross || "0") === "1"
        : String(document.body.dataset.hideCross || "0") === "1";
      const nextValue = current ? "0" : "1";
      document.body.dataset.hideCross = nextValue;
      if (role === "control") {
        selectedDeviceState = { ...(selectedDeviceState || {}), hideCross: nextValue };
      }
      render();
      publishState();
    });

    randomPointsBtn.addEventListener("click", () => {
      const current = role === "control"
        ? String(selectedDeviceState?.randomPoints || "0") === "1"
        : String(document.body.dataset.randomPoints || "0") === "1";
      const nextValue = current ? "0" : "1";
      let nextSeed = role === "control" ? selectedDeviceState?.randomSeed : document.body.dataset.randomSeed;
      if (nextValue === "1" && !nextSeed) nextSeed = makeRandomSeed();
      document.body.dataset.randomPoints = nextValue;
      document.body.dataset.randomSeed = nextSeed || "";
      if (role === "control") {
        selectedDeviceState = {
          ...(selectedDeviceState || {}),
          randomPoints: nextValue,
          randomSeed: nextSeed || "",
          randomPointCount: controls.randomPointCount.value
        };
      }
      render();
      publishState();
    });

    exportPngBtn.addEventListener("click", exportPng);

    savePresetBtn.addEventListener("click", saveCurrentPreset);
    presetNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") saveCurrentPreset();
    });

    document.getElementById("copyAddressBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(lanAddress.textContent);
      } catch (_) {}
    });

    document.getElementById("copyControlUrlBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(controlUrlText.textContent);
      } catch (_) {}
    });

    document.getElementById("openControlUrlBtn").addEventListener("click", () => {
      if (serverMode && controlUrlText.textContent.startsWith("http")) {
        location.href = controlUrlText.textContent;
      }
    });

    document.getElementById("localModeBtn").addEventListener("click", () => startRole("local"));
    document.getElementById("displayModeBtn").addEventListener("click", () => startRole("display"));
    document.getElementById("controlModeBtn").addEventListener("click", () => startRole("control"));
    document.getElementById("refreshDevicesBtn").addEventListener("click", loadDevices);
    saveDeviceNameBtn.addEventListener("click", async () => {
      if (!selectedDeviceId) return;
      const nextName = deviceNameInput.value.trim().slice(0, 40);
      if (!nextName) {
        updateStatus("名称不能为空");
        return;
      }
      saveDeviceNameBtn.disabled = true;
      try {
        const response = await fetch("/api/device-name", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id: selectedDeviceId, name: nextName })
        });
        if (!response.ok) throw new Error("rename");
        selectedDeviceInfo = { ...(selectedDeviceInfo || {}), name: nextName };
        selectedDeviceNameDraft = nextName;
        selectedDeviceNameLocked = false;
        updateStatus(`已改名为 ${nextName}`);
        await loadDevices();
      } catch (_) {
        updateStatus("改名失败");
      } finally {
        saveDeviceNameBtn.disabled = !selectedDeviceId;
      }
    });
    forceLockBtn.addEventListener("click", async () => {
      const deviceLocked = String(selectedDeviceState?.displayLocked || selectedDeviceState?.forceLock || "0") === "1";
      await setRemoteLock(!deviceLocked);
    });
    stopServerBtn.addEventListener("click", stopServer);

    document.addEventListener("keydown", async (event) => {
      if (!isLockHotkey(event)) return;
      event.preventDefault();
      event.stopPropagation();
      await toggleLockFromHotkey();
    }, true);

    deviceNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") saveDeviceNameBtn.click();
    });

    deviceNameInput.addEventListener("input", () => {
      selectedDeviceNameDraft = deviceNameInput.value;
      selectedDeviceNameLocked = true;
    });

    deviceNameInput.addEventListener("focus", () => {
      selectedDeviceNameLocked = true;
    });

    deviceNameInput.addEventListener("blur", () => {
      selectedDeviceNameLocked = false;
      selectedDeviceNameDraft = deviceNameInput.value;
    });

    hotCorner.addEventListener("pointerdown", () => {
      cornerTapCount += 1;
      clearTimeout(cornerTimer);
      cornerTimer = setTimeout(() => {
        cornerTapCount = 0;
      }, 850);
      if (cornerTapCount >= 3) {
        cornerTapCount = 0;
        unlockProjection();
      }
    });

    window.chromaDesktop?.onProjectionLockToggle?.((nextLocked) => {
      if (nextLocked && !locked) lockProjection();
      if (!nextLocked && locked) unlockProjection();
    });

    window.addEventListener("popstate", () => {
      if (locked) {
        pushExitGuard();
        lockProjection();
      }
    });

    window.addEventListener("resize", render);
    window.addEventListener("orientationchange", () => setTimeout(render, 250));
    document.addEventListener("visibilitychange", () => {
      if (locked && document.visibilityState === "visible") requestWakeLock();
    });

    document.querySelectorAll("img, canvas").forEach((element) => {
      element.setAttribute("draggable", "false");
    });

    function isTextEditingTarget(target) {
      return !!target?.closest?.("input, textarea, select, [contenteditable='true']");
    }

    ["touchmove", "gesturestart", "gesturechange", "contextmenu", "dragstart", "selectstart", "dblclick"].forEach((eventName) => {
      document.addEventListener(eventName, (event) => {
        if (isTextEditingTarget(event.target)) return;
        if (locked || eventName !== "touchmove") event.preventDefault();
        if (eventName === "dblclick") window.getSelection?.()?.removeAllRanges?.();
      }, { passive: false });
    });

    loadServerInfo().then(() => {
      const mode = new URLSearchParams(location.search).get("mode");
      if (mode === "control") {
        startRole("control");
        return;
      }
      if (mode === "local") {
        startRole("local");
        return;
      }
      if (mode === "display" || serverMode) {
        startRole("display");
        return;
      }
    });
  </script>
</body>
</html>
